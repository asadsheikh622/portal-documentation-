<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Management Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Shop Management Portal</h1>
    </header>

    <section class="dashboard">
        <div class="card">
            <h3>Total Clients</h3>
            <p id="totalClients">0</p>
        </div>
        <div class="card">
            <h3>Total Income</h3>
            <p id="totalIncome">0</p>
        </div>
    </section>

    <section class="form-section">
        <h2>Add Client Record</h2>
        <form id="clientForm">
            <input type="text" id="name" placeholder="Client Name" required>
            <input type="number" id="phone" placeholder="Phone Number" required>
            <input type="text" id="document" placeholder="Services" required>

            <!-- <select id="document">
            <option value="CV">CV</option>
            <option value="Affidavit">Affidavit</option>
            <option value="Sale Agreement">Sale Agreement</option>
        </select> -->
            <input type="number" id="charges" placeholder="Charges" required>
            <input type="number" id="advance" placeholder="Advance">
            <input type="number" id="remaining" placeholder="Remaining">
            <button type="submit" style="background-color: #0B3D91; padding: 10px 20px; border: none;">
  Add Record
</button>
        </form>
    </section>

    <section class="table-section">
        <h2>Client Records</h2>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Document</th>
                    <th>Charges</th>
                    <th>Advance Amount </th>
                    <th>Remaining Amount</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="recordTable"></tbody>
        </table>
    </section>

   <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyA03P8WbsCUIQ9ivdq_vSFU6MBPzgY7wLw",
    authDomain: "customer-portal567.firebaseapp.com",
    databaseURL: "https://customer-portal567-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "customer-portal567",
    storageBucket: "customer-portal567.firebasestorage.app",
    messagingSenderId: "737636930756",
    appId: "1:737636930756:web:6fc27d87a8c68cdfba2591",
    measurementId: "G-Z6S7F6ZQ4E"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔥 FORM SUBMIT
let editId = null;

document.getElementById("clientForm").addEventListener("submit", (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const documentType = document.getElementById("document").value;
    const charges = document.getElementById("charges").value;
    const advance = document.getElementById("advance").value;
    const remaining = document.getElementById("remaining").value;

    if (editId === null) {
        // ADD
        push(ref(db, "clients"), {
            name, phone, documentType, charges, advance, remaining
        });
        alert("Save ho gaya ✅");
    } else {
        // UPDATE
        set(ref(db, "clients/" + editId), {
            name, phone, documentType, charges, advance, remaining
        });
        alert("Update ho gaya ✅");
        editId = null;
    }

    e.target.reset();
});

// 🔥 REALTIME DATA SHOW
const table = document.getElementById("recordTable");

onValue(ref(db, "clients"), (snapshot) => {
    let output = "";
    let total = 0;
    let count = 0;

    snapshot.forEach((child) => {
        const data = child.val();
        const id = child.key;

        count++;
        total += Number(data.charges);

        output += `
        <tr>
            <td>${data.name}</td>
            <td>${data.phone}</td>
            <td>${data.documentType}</td>
            <td>${data.charges}</td>
            <td>${data.advance}</td>
            <td>${data.remaining}</td>
            <td>
                <button onclick="editData('${id}', '${data.name}', '${data.phone}', '${data.documentType}', '${data.charges}', '${data.advance}', '${data.remaining}')">Edit</button>
                <button onclick="deleteData('${id}')">Delete</button>
            </td>
        </tr>
        `;
    });

    table.innerHTML = output;
    document.getElementById("totalClients").innerText = count;
    document.getElementById("totalIncome").innerText = total;
});

// 🔥 DELETE FUNCTION
window.deleteData = function(id) {
    if (confirm("Delete karna hai?")) {
        remove(ref(db, "clients/" + id));
    }
};

// 🔥 EDIT FUNCTION
window.editData = function(id, name, phone, documentType, charges, advance, remaining) {

    document.getElementById("name").value = name;
    document.getElementById("phone").value = phone;
    document.getElementById("document").value = documentType;
    document.getElementById("charges").value = charges;
    document.getElementById("advance").value = advance;
    document.getElementById("remaining").value = remaining;

    editId = id;
};

</script>
</body>

</html>
